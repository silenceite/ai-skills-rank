name: Trending Ranking (每月28号晚8点 · 飙升榜)

on:
  schedule:
    # 每月28号 UTC 12:00 = 北京时间 20:00
    - cron: '0 12 28 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  generate-trending-ranking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Get current date
        id: date
        run: echo "month=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Create report directory
        run: mkdir -p reports/${{ steps.date.outputs.month }}

      - name: Run trending ranking collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/collect_trending.py --output reports/${{ steps.date.outputs.month }}/trending-skills-${{ steps.date.outputs.month }}.html --month ${{ steps.date.outputs.month }}

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git commit -m "data: trending ranking ${{ steps.date.outputs.month }}" || echo "No changes to commit"
          git push

      - name: Update GitHub Pages
        if: always()
        run: |
          mkdir -p docs/reports/${{ steps.date.outputs.month }}
          cp reports/${{ steps.date.outputs.month }}/trending-skills-*.html docs/reports/${{ steps.date.outputs.month }}/ || true
          mkdir -p docs/latest
          cp reports/${{ steps.date.outputs.month }}/trending-skills-${{ steps.date.outputs.month }}.html docs/latest/trending-ranking.html || true
          git add docs/
          git commit -m "pages: update trending ranking" || echo "No changes"
          git push
