name: Activity Ranking (每月2号)

on:
  schedule:
    # 每月2号 UTC 02:00 = 北京时间 10:00
    - cron: '0 2 2 * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  generate-activity-ranking:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests jinja2 python-dateutil

      - name: Get current date
        id: date
        run: echo "month=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - name: Create report directory
        run: mkdir -p reports/${{ steps.date.outputs.month }}

      - name: Run activity ranking collector
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COLLECTOR_TOKEN: ${{ secrets.COLLECTOR_TOKEN }}
        run: |
          python scripts/collect_activity.py --output reports/${{ steps.date.outputs.month }}/active-ai-skills-${{ steps.date.outputs.month }}.html

      - name: Generate report
        if: always()
        run: |
          python scripts/generate_report.py --type activity --month ${{ steps.date.outputs.month }} || true

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          git commit -m "data: activity ranking ${{ steps.date.outputs.month }}" || echo "No changes to commit"
          git push

      - name: Update GitHub Pages
        if: always()
        run: |
          mkdir -p docs/reports/${{ steps.date.outputs.month }}
          cp reports/${{ steps.date.outputs.month }}/active-ai-skills-*.html docs/reports/${{ steps.date.outputs.month }}/ || true
          mkdir -p docs/latest
          cp reports/${{ steps.date.outputs.month }}/active-ai-skills-*.html docs/latest/activity-ranking.html || true
          git add docs/
          git commit -m "pages: update activity ranking" || echo "No changes"
          git push
